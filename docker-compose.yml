version: "3.9"

services:
  minio:
    image: minio/minio:latest
    container_name: streaming-app-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    container_name: streaming-app-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streaming}
      POSTGRES_DB: ${POSTGRES_DB:-streaming_app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streaming}"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: streaming-app-livekit
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      # Format: "<key>: <secret>" (note the colon-space separator).
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set, 32+ chars}"
    ports:
      - "7880:7880"         # signaling (WebSocket)
      - "7881:7881"         # TCP fallback for ICE
      - "50000-60000:50000-60000/udp"   # WebRTC media
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  backend:
    build: .
    container_name: streaming-app-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      livekit:
        condition: service_started
    env_file: .env
    environment:
      # Docker-internal hostnames override .env values which target host-mode dev.
      DATABASE_URL: postgresql://${POSTGRES_USER:-streaming}:${POSTGRES_PASSWORD:-streaming}@postgres:5432/${POSTGRES_DB:-streaming_app}
      MINIO_ENDPOINT: minio:9000
      LIVEKIT_URL_INTERNAL: ws://livekit:7880
    ports:
      - "5001:5001"

  # broadcaster: activated in Commit 6b-iii (LiveKit publishing worker).
  # The service is intentionally not declared yet because the code in
  # broadcaster/ still uses the OBS-RTMP workflow and hasn't been wired to
  # livekit-rtc publishing yet. Until then run it on the host:
  #     python broadcaster/demo.py --camera 2

volumes:
  minio_data:
  postgres_data:
